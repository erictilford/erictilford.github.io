<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Tic Tac Toe</title>
	<link rel="icon" href="assets/images/oliverpixel-export.png">
	<script src="https://kit.fontawesome.com/ddc56dc609.js" crossorigin="anonymous"></script>
	<link rel="stylesheet" href="src/tictactoe.css">
</head>
<body>
	<div class="wrap">
		<header>
			<h1>Tic Tac Toe</h1>
			<div class="status" id="status">Player X's turn</div>
		</header>

		<main>
			<div class="board" id="board" role="grid" aria-label="Tic Tac Toe board">
				<div class="cell" data-index="0" role="button" aria-label="cell 1"></div>
				<div class="cell" data-index="1" role="button" aria-label="cell 2"></div>
				<div class="cell" data-index="2" role="button" aria-label="cell 3"></div>
				<div class="cell" data-index="3" role="button" aria-label="cell 4"></div>
				<div class="cell" data-index="4" role="button" aria-label="cell 5"></div>
				<div class="cell" data-index="5" role="button" aria-label="cell 6"></div>
				<div class="cell" data-index="6" role="button" aria-label="cell 7"></div>
				<div class="cell" data-index="7" role="button" aria-label="cell 8"></div>
				<div class="cell" data-index="8" role="button" aria-label="cell 9"></div>
			</div>

			<div class="controls">
				<div class="small">First to 3 in a row wins</div>
				<div style="margin-left:auto">
					<button id="undo" class="btn small">Undo</button>
					<button id="restart" class="btn small">Restart</button>
				</div>
			</div>
		</main>
	</div>

	<script src="src/tictactoe.js"></script>
</body>
</html>
