<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS TOURNEY</title>

    <link rel="stylesheet" href="src/styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--FONT AWESOME-->
    <script src="https://kit.fontawesome.com/ddc56dc609.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <header>
        <h2>2nd Annual Tyler Technologies Oklahoma Rock Paper Scissors Tournament <i class="fa-solid fa-hand-back-fist fa-xs"></i> <i class="fa-solid fa-hand fa-xs"></i> <i class="fa-solid fa-hand-scissors fa-xs"></i></h2>
    </header>
    <div class="container">
        <main>
            <div class="row">
                <div class="col-md-5">
                    <div class="image-placeholder">
                    <img id="left-image" src="assets/rock.png" alt="Rock" style="max-width: 100%; max-height: 100%;"></img>
                    </div>

                    <input type="text" id="player1" class="form-control player-name" placeholder="Player 1" style="text-align: center;">
                </div>


                <div class="col-md-2" style="text-align: center; display: flex; align-items: center; justify-content: center;">
                    <h1 style="color:darkred; font-size: 3em;">VS</h1>
                </div>


                <div class="col-md-5">
                    <div class="image-placeholder">
                    <img id="right-image" src="assets/paper.png" alt="Paper" style="max-width: 100%; max-height: 100%;"></img>
                    </div>
                    <input type="text" id="player2" class="form-control player-name" placeholder="Player 2" style="text-align: center;">
                </div>
            </div>
        </main>
    </div>
    <script src="src/scripts/main.js"></script>
</body>

</html>
